name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: cinematch
      WANDB_API_KEY: ${{ secrets.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 }}
      API_KEY: ${{ secrets.API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Build and start services
        run: |
          docker compose -f infra/docker-compose.db_included.yml up -d --build
          
      - name: Wait for DB to be ready
        run: sleep 15

      - name: Run backend tests
        run: |
          docker compose exec -T backend pytest

      - name: Run model tests
        run: |
          docker compose exec -T model-service pytest

      - name: Shutdown
        run: docker compose -f ./docker-compose.db_included.yml down
